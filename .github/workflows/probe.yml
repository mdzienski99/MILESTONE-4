name: Probe Pipeline

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run probe
        continue-on-error: true
        run: |
          python scripts/probe.py --num-users 10 --calls-per-user 1 --json > probe_result.json 2>&1 || true

      - name: Upload probe result
        uses: actions/upload-artifact@v4
        with:
          name: probe-result
          path: probe_result.json