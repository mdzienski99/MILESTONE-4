name: Probe Pipeline (Cron)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL || 'http://localhost:8000' }}
      KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS || '127.0.0.1:9092' }}
      TEAM_NAME: team

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests numpy

      - name: Run probe (if API available)
        id: probe
        continue-on-error: true
        run: |
          python scripts/probe.py --num-users 50 --calls-per-user 2 --json > /tmp/probe_result.json 2>&1
          cat /tmp/probe_result.json

      - name: Upload probe result
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: probe-result-${{ github.run_id }}
          path: /tmp/probe_result.json

      - name: Comment on recent issues (ops log)
        if: always() && github.event_name == 'schedule'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/probe_result.json', 'utf8'));
            const comment = `
            ## Probe Run Report
            - Timestamp: ${result.timestamp}
            - Total Requests: ${result.total_requests}
            - Success Rate: ${result.successful_requests}/${result.total_requests}
            - Personalized %: ${result.personalized_pct.toFixed(1)}%
            - Mean Latency: ${result.mean_latency_ms.toFixed(2)}ms
            `;
            console.log(comment);
