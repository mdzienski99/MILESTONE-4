name: Retrain + Publish Models

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retrain models
        run: |
          python stream/train_models.py

      - name: Publish model version
        run: |
          python scripts/publish_model.py

      - name: Commit updated artifacts
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add artifacts/
          if git diff --cached --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "Auto publish model version"
            git push
          fi